<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Niyam TradeOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06080F;--s1:#0B0E1A;--s2:#0F1220;--s3:#141828;--s4:#1A1F30;
  --brd:rgba(99,102,241,0.12);--brd2:rgba(99,102,241,0.22);
  --pur:#6366F1;--purL:#818CF8;--purD:#4338CA;
  --grn:#10B981;--grnL:#34D399;--grnD:#059669;
  --red:#EF4444;--redL:#F87171;
  --amb:#F59E0B;--ambL:#FCD34D;
  --tp:#F1F5F9;--ts:#64748B;--tm:#1E293B;--td:#334155;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Syne',sans-serif;color:var(--tp);max-width:480px;margin:0 auto;min-height:100vh;}
::-webkit-scrollbar{display:none;}
.mono{font-family:'DM Mono',monospace;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.spin{animation:spin 1s linear infinite;display:inline-block;}
.pulse{animation:pulse 2s ease-in-out infinite;}
.card{background:var(--s1);border:1px solid var(--brd);border-radius:18px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(129,140,248,0.35),transparent);}
.hero{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(16,185,129,0.05));border:1px solid rgba(99,102,241,0.25);border-radius:22px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sbox{background:var(--s2);border-radius:13px;padding:13px 14px;border:1px solid var(--brd);}
.sbox .l{font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px;}
.sbox .v{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--brd2);background:transparent;color:var(--ts);font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;margin:3px;transition:all 0.2s;font-weight:500;}
.chip.on{border-color:var(--pur);background:rgba(99,102,241,0.15);color:var(--purL);}
.chip.on-g{border-color:var(--grn);background:rgba(16,185,129,0.12);color:var(--grnL);}
.chip.on-r{border-color:var(--red);background:rgba(239,68,68,0.12);color:var(--redL);}
.chip.on-a{border-color:var(--amb);background:rgba(245,158,11,0.12);color:var(--ambL);}
.bdg{border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;display:inline-block;margin:2px;}
.sbtn{width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--brd);color:var(--ts);cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;margin:2px;transition:all 0.15s;}
.sbtn.on{background:var(--pur);border-color:var(--pur);color:#fff;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(11,14,26,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--brd2);display:flex;z-index:100;padding:10px 0 16px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--ts);padding:4px 2px;font-size:9px;font-family:'Syne',sans-serif;font-weight:500;transition:color 0.2s;}
.nav-btn.on{color:var(--purL);}
.nav-dot{width:4px;height:4px;border-radius:2px;background:var(--pur);}
.screen{padding:20px 16px 90px;min-height:100vh;animation:slideUp 0.25s ease;}
.bar-wrap{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease;}
.live{display:inline-flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;border-radius:3px;background:var(--grn);animation:pulse 2s ease-in-out infinite;}
.ring-wrap{position:relative;flex-shrink:0;}
.j-panel{background:var(--s2);border-radius:14px;padding:16px;margin-top:10px;border:1px solid var(--brd2);}
.j-panel .chip{font-size:11px;padding:4px 10px;}
.j-q{font-size:11px;color:var(--ts);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;margin-top:12px;}
.j-q:first-child{margin-top:0;}
.tbl{width:100%;border-collapse:collapse;}
.tbl td,.tbl th{padding:9px 8px;font-size:12px;border-bottom:1px solid var(--brd);}
.tbl th{font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;}
.tbl tr:last-child td{border-bottom:none;}
.tbl .val{font-family:'DM Mono',monospace;font-weight:700;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.month-btn{background:var(--s2);border:1px solid var(--brd2);border-radius:8px;color:var(--tp);padding:6px 12px;cursor:pointer;font-size:13px;font-family:'Syne',sans-serif;}
.section-h{font-size:13px;font-weight:700;color:var(--tp);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:var(--s3);outline:none;width:100%;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:8px;background:var(--pur);cursor:pointer;}
input,textarea{font-family:'Syne',sans-serif;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── API ───────────────────────────────────────────────────────────────────────
async function dhanCall(ep,body){
  const url=`/.netlify/functions/dhan?endpoint=${encodeURIComponent(ep)}`;
  const o=body?{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}:{};
  const r=await fetch(url,o);const d=await r.json();
  if(d.error)throw new Error(d.error);
  if(d.errorCode)throw new Error(`${d.errorCode}: ${d.errorMessage}`);
  return d;
}

// ── BROKERAGE ESTIMATE ────────────────────────────────────────────────────────
function estBrokerage(t){
  const isOpts=/(CE|PE|CALL|PUT|FUT)/.test(t.symbol||"");
  const isDel=/(CNC|DELIVERY|LONG_TERM)/i.test(t.product||"");
  const buy=(t.buyAvg||0)*(t.qty||0);
  const sell=(t.sellAvg||t.buyAvg||0)*(t.qty||0);
  if(isOpts){
    const brok=40;const stt=sell*0.000625;
    const exch=(buy+sell)*0.0005;const gst=(brok+exch)*0.18;
    return Math.max(5,Math.round(stt+exch+brok+gst));
  }else if(isDel){
    const stt=(buy+sell)*0.001;const exch=(buy+sell)*0.0000325;
    return Math.max(2,Math.round(stt+exch));
  }else{
    const brok=40;const stt=sell*0.00025;
    const exch=(buy+sell)*0.0000345;const gst=(brok+exch)*0.18;
    return Math.max(5,Math.round(stt+brok+exch+gst));
  }
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function calcBeh(trades){
  if(!trades.length)return{total:0,rc:0,disc:0,cons:0,eq:0,wr:0};
  const rc=Math.round((trades.filter(t=>t.sl>0).length/trades.length)*100);
  const disc=Math.round((trades.filter(t=>["A","B","B+"].includes(t.grade)).length/trades.length)*100);
  const cons=Math.min(100,Math.round((trades.filter(t=>t.lesson||t.emotion).length/trades.length)*100));
  const eq=Math.round((trades.reduce((a,t)=>a+(t.confidence||5),0)/trades.length)*10);
  const wr=Math.round((trades.filter(t=>(t.realizedPnl||0)>0).length/trades.length)*100);
  const total=Math.round(rc*0.30+disc*0.25+cons*0.20+eq*0.15+wr*0.10);
  return{total,rc,disc,cons,eq,wr};
}

function calcAnalytics(trades){
  const closed=trades.filter(t=>t.isClosed!==false);
  const wins=closed.filter(t=>(t.realizedPnl||0)>0);
  const losses=closed.filter(t=>(t.realizedPnl||0)<0);
  const highPnl=wins.length?Math.max(...wins.map(t=>t.realizedPnl||0)):0;
  const lowPnl=losses.length?Math.min(...losses.map(t=>t.realizedPnl||0)):0;
  const netPnL=trades.reduce((a,t)=>a+(t.realizedPnl||0)+(t.unrealizedPnl||0),0);
  const totalBrok=trades.reduce((a,t)=>a+estBrokerage(t),0);
  const avgW=wins.length?wins.reduce((a,t)=>a+(t.realizedPnl||0),0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((a,t)=>a+(t.realizedPnl||0),0)/losses.length):1;
  const avgRR=(avgW/avgL).toFixed(2);
  // Emotions
  const emos={};trades.forEach(t=>{if(t.emotion)emos[t.emotion]=(emos[t.emotion]||0)+1;});
  // Setups
  const setups={};
  trades.forEach(t=>{if(t.setup){if(!setups[t.setup])setups[t.setup]={w:0,n:0,pnl:0};setups[t.setup].n++;if((t.realizedPnl||0)>0)setups[t.setup].w++;setups[t.setup].pnl+=(t.realizedPnl||0);}});
  // Day-wise
  const dw={};const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  trades.forEach(t=>{if(t.date){const d=DN[new Date(t.date).getDay()];if(!dw[d])dw[d]={w:0,n:0,pnl:0};dw[d].n++;if((t.realizedPnl||0)>0)dw[d].w++;dw[d].pnl+=(t.realizedPnl||0);}});
  // Outcomes
  const outcomes={};trades.forEach(t=>{if(t.outcome)outcomes[t.outcome]=(outcomes[t.outcome]||0)+1;});
  // Exit types
  const exits={};trades.forEach(t=>{if(t.exitType)exits[t.exitType]=(exits[t.exitType]||0)+1;});
  // Hold time
  const withHold=trades.filter(t=>t.holdTime>0);
  const avgHold=withHold.length?Math.round(withHold.reduce((a,t)=>a+t.holdTime,0)/withHold.length):0;
  const maxHold=withHold.length?Math.max(...withHold.map(t=>t.holdTime)):0;
  return{highPnl,lowPnl,netPnL,totalBrok,avgRR,avgW,avgL,emos,setups,dw,outcomes,exits,avgHold,maxHold,
    wins:wins.length,losses:losses.length,total:trades.length,closed:closed.length};
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmtI=(v,d=2)=>Math.abs(v).toLocaleString("en-IN",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmt={
  pnl:(v)=>`${v>=0?"+":"-"}₹${fmtI(v)}`,
  inr:(v)=>`₹${fmtI(v)}`,
  n:(v)=>fmtI(v),
};
const pC=(v)=>v>0?"color:var(--grn)":v<0?"color:var(--red)":"color:var(--ts)";
const pHex=(v)=>v>0?"#10B981":v<0?"#EF4444":"#64748B";
const sHex=(s)=>s>=70?"#10B981":s>=45?"#F59E0B":"#EF4444";
const gHex=(g)=>["A","A+"].includes(g)?"#10B981":["B","B+"].includes(g)?"#F59E0B":"#EF4444";
const eTypeColor=(e)=>e==="Target Hit"?"var(--grn)":e==="Stop Loss Hit"?"var(--red)":"var(--amb)";
function nowStr(){const d=new Date();return d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})+" · "+d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"});}
function monthLabel(key){const[y,m]=key.split("-");const d=new Date(y,m-1,1);return d.toLocaleString("default",{month:"long",year:"numeric"});}
function curMonthKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const ld=(k,fb)=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):fb;}catch{return fb;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ── MONTHLY DATA ──────────────────────────────────────────────────────────────
function getMonthGroups(allTrades){
  const mg={};
  allTrades.forEach(t=>{
    if(!t.date)return;
    const d=new Date(t.date);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    if(!mg[key])mg[key]=[];
    mg[key].push(t);
  });
  return mg;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={
  screen:"dashboard",
  trades:ld('nt',[]),
  fund:ld('nf',null),
  syncing:false,syncMsg:"",testStatus:null,
  filter:"All",openJournal:null,
  selMonth:curMonthKey(),
  cfg:ld('cfg',{maxTrades:3,capital:30000,dailyLoss:1000,dailyTarget:3000}),
  time:nowStr(),
};
setInterval(()=>{S.time=nowStr();if(S.screen==="dashboard")render();},60000);
const set=(p)=>{Object.assign(S,p);render();};

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=
    `<div style="background:var(--bg);min-height:100vh;max-width:480px;margin:0 auto;">
      ${({dashboard:rDash,analytics:rAnal,trades:rTrades,settings:rSet}[S.screen]||rDash)()}
      ${rNav()}
    </div>`;
  bind();
}
function rNav(){
  const tabs=[["dashboard","⬡","Home"],["analytics","◈","Analytics"],["trades","≡","Trades"],["settings","⚙","Settings"]];
  return`<div class="nav">${tabs.map(([id,ic,lb])=>`<button class="nav-btn ${S.screen===id?"on":""}" onclick="go('${id}')"><span style="font-size:20px">${ic}</span>${lb}${S.screen===id?'<div class="nav-dot"></div>':''}</button>`).join('')}</div>`;
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function Ring(score,size=110){
  const r=42,cx=size/2,cy=size/2,circ=2*Math.PI*r,dash=(score/100)*circ,c=sHex(score);
  const lbl=score>=70?"DISCIPLINED":score>=45?"CAUTION":"HIGH RISK";
  return`<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1A1F30" stroke-width="8"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="8" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" style="filter:drop-shadow(0 0 6px ${c}88)"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
      <span class="mono" style="font-size:22px;font-weight:700;color:${c}">${score}</span>
      <span style="font-size:7px;color:${c};letter-spacing:0.08em;font-weight:700">${lbl}</span>
    </div>
  </div>`;
}
function MBar(label,weight,val){
  const c=sHex(val);
  return`<div style="margin-bottom:9px">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:11px;color:var(--ts)">${label}<span style="color:var(--tm);margin-left:4px">${weight}%</span></span>
      <span class="mono" style="font-size:11px;color:${c};font-weight:600">${val}%</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${val}%;background:linear-gradient(90deg,${c}88,${c})"></div></div>
  </div>`;
}
function Bdg(t,c,bg){return`<span class="bdg" style="background:${bg||c+'18'};color:${c};border:1px solid ${c}33">${t}</span>`;}
function SBox(l,v,c,sub){return`<div class="sbox"><div class="l">${l}</div><div class="v" style="color:${c||"var(--tp)"}">${v}</div>${sub?`<div style="font-size:10px;color:var(--ts);margin-top:3px">${sub}</div>`:""}</div>`;}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function rDash(){
  const beh=calcBeh(S.trades);
  const closedPnL=S.trades.reduce((a,t)=>a+(t.realizedPnl||0),0);
  const openPnL=S.trades.reduce((a,t)=>a+(t.unrealizedPnl||0),0);
  const totalPnL=closedPnL+openPnL;
  const wins=S.trades.filter(t=>(t.realizedPnl||0)>0).length;
  const openCount=S.trades.filter(t=>t.isClosed===false).length;
  const closedCount=S.trades.filter(t=>t.isClosed!==false).length;
  const avail=S.fund?.availabelBalance||0;
  const margin=S.fund?.utilizedAmount||0;
  const {capital,dailyLoss,dailyTarget,maxTrades}=S.cfg;
  const lossHit=closedPnL<=-dailyLoss;
  const targetHit=closedPnL>=dailyTarget;
  const lossUsed=Math.min(100,Math.abs(Math.min(closedPnL,0))/dailyLoss*100);
  const profitPct=Math.min(100,Math.max(0,closedPnL)/dailyTarget*100);
  return`<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div>
        <div style="font-size:10px;color:var(--ts);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:2px">NIYAM TRADEOS</div>
        <div style="font-size:24px;font-weight:800;letter-spacing:-0.5px">Dashboard</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <button onclick="syncDhan()" style="display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--pur),var(--purD));border:none;border-radius:10px;color:#fff;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">
          <span class="${S.syncing?"spin":""}" style="display:inline-block">↻</span>${S.syncing?"SYNCING":"SYNC DHAN"}
        </button>
        <div class="live"><div class="live-dot"></div><span style="font-size:10px;color:var(--ts)">${S.time}</span></div>
      </div>
    </div>

    ${S.syncMsg?`<div style="padding:11px 14px;border-radius:12px;margin-bottom:12px;font-size:12px;background:${S.syncMsg.startsWith("✓")?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)"};color:${S.syncMsg.startsWith("✓")?"var(--grnL)":"var(--redL)"};border:1px solid ${S.syncMsg.startsWith("✓")?"var(--grn)":"var(--red)"}33">${S.syncMsg}</div>`:""}

    ${lossHit?`<div style="padding:12px 14px;border-radius:12px;margin-bottom:12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🚨</span>
      <div><div style="font-size:13px;font-weight:700;color:var(--redL)">Daily Loss Limit Hit!</div>
      <div style="font-size:11px;color:var(--ts)">Stop trading. You've hit -₹${dailyLoss} limit.</div></div>
    </div>`:""}
    ${targetHit?`<div style="padding:12px 14px;border-radius:12px;margin-bottom:12px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🎯</span>
      <div><div style="font-size:13px;font-weight:700;color:var(--grnL)">Daily Target Hit!</div>
      <div style="font-size:11px;color:var(--ts)">Congratulations! Consider stopping for the day.</div></div>
    </div>`:""}

    <!-- P&L HERO -->
    <div class="hero">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px">TOTAL P&L TODAY</div>
          <div class="mono" style="font-size:34px;font-weight:800;line-height:1;color:${pHex(totalPnL)};filter:drop-shadow(0 0 10px ${pHex(totalPnL)}55)">${fmt.pnl(totalPnL)}</div>
          <div style="font-size:11px;color:var(--ts);margin-top:6px">${S.trades.length} trades · ${wins}W · ${S.trades.length-wins}L</div>
        </div>
        <div style="text-align:right">
          ${Bdg(S.fund?"LIVE":"OFFLINE",S.fund?"#10B981":"#64748B")}
          <div style="margin-top:8px;font-size:10px;color:var(--ts)">Capital</div>
          <div class="mono" style="font-size:13px;font-weight:700;color:var(--purL)">${fmt.inr(capital)}</div>
        </div>
      </div>
      <!-- Progress bars -->
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <div style="flex:1">
          <div style="font-size:9px;color:var(--ts);margin-bottom:4px">LOSS USED (limit: ₹${(dailyLoss).toLocaleString("en-IN")})</div>
          <div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${lossUsed}%;background:${lossUsed>80?"var(--red)":lossUsed>50?"var(--amb)":"var(--grn)"};border-radius:3px"></div>
          </div>
        </div>
        <div style="flex:1">
          <div style="font-size:9px;color:var(--ts);margin-bottom:4px">TARGET (₹${(dailyTarget).toLocaleString("en-IN")})</div>
          <div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${profitPct}%;background:var(--grn);border-radius:3px"></div>
          </div>
        </div>
      </div>
      <div class="g2">
        <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;border:1px solid rgba(16,185,129,0.18)">

// ── TRADES ────────────────────────────────────────────────────────────────────
function rTrades(){
  const filters=["All","Open","Closed","Wins","Losses","Journaled"];
  const filtered=S.trades.filter(t=>{
    const pnl=t.realizedPnl||0;
    if(S.filter==="Open")return t.isClosed===false;
    if(S.filter==="Closed")return t.isClosed!==false;
    if(S.filter==="Wins")return pnl>0;
    if(S.filter==="Losses")return pnl<0;
    if(S.filter==="Journaled")return t.lesson||t.emotion;
    return true;
  });
  const totalPnL=S.trades.reduce((a,t)=>a+(t.realizedPnl||0)+(t.unrealizedPnl||0),0);
  return`<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:24px;font-weight:800">Trades</div>
        <div class="mono" style="font-size:11px;margin-top:2px;color:${pHex(totalPnL)}">${S.trades.length} positions · ${fmt.pnl(totalPnL)}</div>
      </div>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
      ${filters.map(f=>`<button class="chip${S.filter===f?" on":""}" onclick="setF('${f}')" style="white-space:nowrap">${f}</button>`).join('')}
    </div>
    ${filtered.length?filtered.map(t=>rTradeCard(t)).join(''):
    `<div style="text-align:center;padding:60px 20px;color:var(--ts)"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:14px;font-weight:700;color:var(--tp);margin-bottom:6px">${S.trades.length?"No trades for this filter":"No trades yet"}</div></div>`}
  </div>`;
}

  return`<div style="background:var(--s1);border:1px solid ${isOpen?"var(--pur)":"var(--brd)"};border-radius:18px;padding:16px;margin-bottom:10px;${isOpen?"box-shadow:0 0 20px rgba(99,102,241,0.15)":""}">

          <span style="font-size:14px;font-weight:700">${t.symbol.replace(/-May\d{4}-/g," ").slice(0,22)}</span>
          ${Bdg(t.isClosed===false?"OPEN":"CLOSED",t.isClosed===false?"#818CF8":"#64748B")}
          ${t.exitType?Bdg(t.exitType==="Target Hit"?"TARGET ✓":t.exitType==="Stop Loss Hit"?"SL ✗":"MANUAL",eTypeColor(t.exitType)):""}
        </div>
        <div style="font-size:10px;color:var(--ts)">${t.date} · ${t.product||""} · ${t.qty} qty</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:10px">
        <div class="mono" style="font-size:18px;font-weight:800;color:${pHex(pnl)}">${fmt.pnl(pnl)}</div>
        ${unr!==0?`<div class="mono" style="font-size:11px;color:${pHex(unr)}">MTM ${fmt.pnl(unr)}</div>`:""}
      </div>
    </div>

    <!-- DETAILS ROW -->
    <div style="background:var(--s2);border-radius:10px;padding:10px;margin-bottom:10px">
      <div class="g2" style="gap:8px">
        <div>
          <div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Entry Avg</div>
          <div class="mono" style="font-size:13px;font-weight:600;color:var(--tp)">${t.buyAvg>0?"₹"+fmt.n(t.buyAvg):"—"}</div>
        </div>
        <div>
          <div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Exit Avg</div>
          <div class="mono" style="font-size:13px;font-weight:600;color:var(--tp)">${t.sellAvg>0?"₹"+fmt.n(t.sellAvg):"—"}</div>
        </div>
        <div>
          <div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Hold Time</div>
          <div class="mono" style="font-size:13px;font-weight:600;color:var(--tp)">${t.holdTime>0?t.holdTime+"m":"—"}</div>
        </div>
        <div>
          <div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Net (after charges)</div>
          <div class="mono" style="font-size:13px;font-weight:700;color:${pHex(netPnL)}">${fmt.pnl(netPnL)}</div>

    <!-- BADGES -->

      ${Bdg(t.type,t.type==="BUY"?"#10B981":"#EF4444")}
      ${t.grade?Bdg("Grade "+t.grade,gHex(t.grade)):`<button onclick="tjSet('${t.id}','grade','A')" style="background:var(--s2);border:1px dashed var(--brd2);border-radius:6px;padding:2px 8px;font-size:10px;color:var(--ts);cursor:pointer;font-family:'Syne',sans-serif">+ Grade</button>`}
      ${t.setup?Bdg(t.setup,"#818CF8"):""}
      ${t.emotion?Bdg(t.emotion,t.emotion==="Calm"?"#10B981":"#EF4444"):""}

    ${t.lesson?`<div style="font-size:11px;color:var(--ts);background:rgba(99,102,241,0.08);border-radius:8px;padding:8px 10px;border-left:2px solid var(--pur);margin-bottom:10px;line-height:1.5">💡 ${t.lesson}</div>`:""}

    <!-- JOURNAL BTN -->

    <div style="display:flex;flex-wrap:wrap">
      ${["Target Hit","Stop Loss Hit","Manual Exit"].map(e=>`<button class="chip${t.exitType===e?" on-"+(e==="Target Hit"?"g":e==="Stop Loss Hit"?"r":"a"):""}" onclick="tjSet('${t.id}','exitType','${e}')">${e}</button>`).join('')}

    <div class="j-q">Setup / Why taken?</div>
    <div style="display:flex;flex-wrap:wrap">

    <div style="display:flex;flex-wrap:wrap">

    <div style="display:flex;flex-wrap:wrap">

    <div class="j-q" style="margin-top:12px">Lesson Learned</div>
    <textarea id="ls_${t.id}" placeholder="What did you learn from this trade?" style="width:100%;min-height:75px;background:var(--bg);border:1px solid var(--brd2);border-radius:10px;color:var(--tp);padding:10px;font-size:13px;resize:vertical;box-sizing:border-box;line-height:1.5">${t.lesson||""}</textarea>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="saveJ('${t.id}')" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--pur),var(--purD));border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">✓ Save Journal</button>

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function rAnal(){
  const mg=getMonthGroups(S.trades);
  const months=Object.keys(mg).sort().reverse();
  if(!months.length&&!S.trades.length) return`<div class="screen"><div style="font-size:24px;font-weight:800;margin-bottom:20px">Analytics</div>
    <div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:12px">📊</div><div style="font-size:14px;font-weight:700;margin-bottom:6px">No Data Yet</div><button onclick="go('dashboard')" style="margin-top:12px;padding:11px 24px;background:var(--pur);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">Go Sync Dhan</button></div></div>`;

  // Ensure selected month is valid
  const sel=months.includes(S.selMonth)?S.selMonth:(months[0]||curMonthKey());
  const selIdx=months.indexOf(sel);
  const curTrades=mg[sel]||S.trades;
  const prevKey=months[selIdx+1]||null;
  const prevTrades=prevKey?mg[prevKey]:[];
  const A=calcAnalytics(curTrades);
  const P=calcAnalytics(prevTrades);

  // Monthly summary table data
  const monthRows=months.map(mk=>{
    const mt=mg[mk]||[];
    const pnl=mt.reduce((a,t)=>a+(t.realizedPnl||0)+(t.unrealizedPnl||0),0);
    const brok=mt.reduce((a,t)=>a+estBrokerage(t),0);
    const w=mt.filter(t=>(t.realizedPnl||0)>0).length;
    const wr=mt.length?Math.round((w/mt.length)*100):0;
    return{mk,label:monthLabel(mk),trades:mt.length,pnl,brok,wr};
  });

  const tblRow=(label,cur,prev,isCur=false)=>`<tr>
    <td style="color:var(--ts)">${label}</td>
    <td class="val" style="text-align:right;color:${isCur?(parseFloat(cur)>=0?"var(--grn)":"var(--red)"):"var(--tp)"}">${cur}</td>
    <td class="val" style="text-align:right;color:var(--ts)">${prev||"—"}</td>
  </tr>`;

  const setupArr=Object.entries(A.setups).sort((a,b)=>b[1].n-a[1].n);
  const emoArr=Object.entries(A.emos).sort((a,b)=>b[1]-a[1]);
  const maxEmo=Math.max(...emoArr.map(x=>x[1]),1);

  return`<div class="screen">
    <div style="font-size:24px;font-weight:800;margin-bottom:18px">Analytics</div>

    <!-- MONTH SELECTOR -->
    <div class="card">
      <div class="month-nav">
        <button class="month-btn" onclick="prevMonth(${JSON.stringify(months)})">‹</button>
        <div style="text-align:center">
          <div style="font-size:14px;font-weight:700">${monthLabel(sel)}</div>
          <div style="font-size:11px;color:var(--ts)">${curTrades.length} trades</div>
        </div>
        <button class="month-btn" onclick="nextMonth(${JSON.stringify(months)})">›</button>
      </div>
      <!-- Monthly summary -->
      <div style="overflow-x:auto">
        <table class="tbl" style="min-width:100%">
          <thead><tr>
            <th style="text-align:left">Month</th>
            <th style="text-align:right">Trades</th>
            <th style="text-align:right">P&L</th>
            <th style="text-align:right">Charges</th>
            <th style="text-align:right">Win%</th>
          </tr></thead>
          <tbody>
            ${monthRows.slice(0,6).map(r=>`<tr style="${r.mk===sel?"background:rgba(99,102,241,0.08);":""}">
              <td style="color:${r.mk===sel?"var(--purL)":"var(--ts)"};font-weight:${r.mk===sel?700:400};font-size:11px">${r.label.split(" ")[0]+" "+r.label.split(" ")[1].slice(2)}</td>
              <td class="val" style="text-align:right;font-size:12px">${r.trades}</td>
              <td class="val" style="text-align:right;font-size:12px;color:${pHex(r.pnl)}">${fmt.pnl(r.pnl)}</td>
              <td class="val" style="text-align:right;font-size:12px;color:var(--red)">-₹${r.brok}</td>
              <td class="val" style="text-align:right;font-size:12px;color:${r.wr>=60?"var(--grn)":"var(--amb)"}">${r.wr}%</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- PROFITABILITY INSIGHTS -->
    <div class="card">
      <div class="section-h">💰 Profitability Insights</div>
      <table class="tbl">
        <thead><tr><th style="text-align:left">Metric</th><th style="text-align:right;color:var(--purL)">${monthLabel(sel).split(" ")[0]}</th><th style="text-align:right">${prevKey?monthLabel(prevKey).split(" ")[0]:"Last Month"}</th></tr></thead>
        <tbody>
          ${tblRow("Highest Profit Trade",A.highPnl>0?fmt.pnl(A.highPnl):"—",P.highPnl>0?fmt.pnl(P.highPnl):"—",true)}
          ${tblRow("Highest Loss Trade",A.lowPnl<0?fmt.pnl(A.lowPnl):"—",P.lowPnl<0?fmt.pnl(P.lowPnl):"—",true)}
          ${tblRow("Avg Profit/Trade",A.total?fmt.pnl(A.netPnL/A.total):"—",P.total?fmt.pnl(P.netPnL/P.total):"—",true)}
          ${tblRow("Net P&L",fmt.pnl(A.netPnL),P.total?fmt.pnl(P.netPnL):"—",true)}
          ${tblRow("Est. Charges","−₹"+A.totalBrok,P.total?"−₹"+P.totalBrok:"—")}
          ${tblRow("Net After Charges",fmt.pnl(A.netPnL-A.totalBrok),P.total?fmt.pnl(P.netPnL-P.totalBrok):"—",true)}
        </tbody>
      </table>
    </div>

    <!-- P&L BREAKDOWN with brokerage -->
    <div class="card">
      <div class="section-h">📊 P&L Breakdown</div>
      ${[
        ["Realized (Closed)",curTrades.reduce((a,t)=>a+(t.realizedPnl||0),0),true],
        ["Unrealized (Open)",curTrades.reduce((a,t)=>a+(t.unrealizedPnl||0),0),true],
        ["Gross P&L",A.netPnL,true],
        ["Est. Brokerage",-A.totalBrok*0.5,false,"~₹"+Math.round(A.totalBrok*0.5)+" brok"],
        ["STT + Exchange Charges",-A.totalBrok*0.5,false,"~₹"+Math.round(A.totalBrok*0.5)+" taxes"],
        ["Net P&L (after all charges)",A.netPnL-A.totalBrok,true],
      ].map(([l,v,signed,note])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--brd)">
        <span style="font-size:12px;color:var(--ts)">${l}</span>
        <span class="mono" style="font-size:13px;font-weight:700;color:${signed?pHex(v):"var(--red)"}">${note||fmt.pnl(v)}</span>
      </div>`).join('')}
    </div>

    <!-- RISK MANAGEMENT -->
    <div class="card">
      <div class="section-h">⚖️ Risk Management</div>
      <table class="tbl">
        <thead><tr><th style="text-align:left">Metric</th><th style="text-align:right;color:var(--purL)">${monthLabel(sel).split(" ")[0]}</th><th style="text-align:right">Last</th></tr></thead>
        <tbody>
          ${tblRow("Avg Risk/Reward",A.avgRR,P.total?P.avgRR:"—")}
          ${tblRow("Avg Win",A.avgW>0?fmt.pnl(A.avgW):"—",P.avgW>0?fmt.pnl(P.avgW):"—",true)}
          ${tblRow("Avg Loss",A.avgL>0?fmt.pnl(-A.avgL):"—",P.avgL>0?fmt.pnl(-P.avgL):"—",true)}
          ${tblRow("Win Rate",A.total?A.wins+"/"+A.total+" ("+Math.round(A.wins/A.total*100)+"%)":"—",P.total?P.wins+"/"+P.total+" ("+Math.round(P.wins/P.total*100)+"%)":"—")}
        </tbody>
      </table>
    </div>

    <!-- STRATEGY PERFORMANCE (bar card style) -->
    ${setupArr.length?`<div class="card">
      <div class="section-h">📈 Strategy Performance</div>
      ${setupArr.map(([s,d])=>{
        const wr=d.n?Math.round((d.w/d.n)*100):0;
        const c=wr>=70?"var(--grn)":wr>=50?"var(--amb)":"var(--red)";
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;color:var(--ts)">${s} <span style="color:var(--tm)">${d.n} trades</span></span>
            <div style="display:flex;gap:10px;align-items:center">
              <span class="mono" style="font-size:11px;color:${pHex(d.pnl)}">${fmt.pnl(d.pnl)}</span>
              <span class="mono" style="font-size:11px;color:${c};font-weight:700">${wr}%</span>
            </div>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${wr}%;background:linear-gradient(90deg,${c}88,${c})"></div></div>
        </div>`;}).join('')}
    </div>`:""}

    <!-- EMOTIONAL ANALYSIS -->
    ${emoArr.length?`<div class="card">
      <div class="section-h">🧠 Emotional Analysis</div>
      <table class="tbl">
        <thead><tr><th style="text-align:left">Emotion</th><th style="text-align:right;color:var(--purL)">Count</th><th style="text-align:right">%</th></tr></thead>
        <tbody>
          ${emoArr.map(([e,c])=>{
            const clr=e==="Calm"?"var(--grn)":["Frustrated","Overconfident","Revenge"].includes(e)?"var(--red)":"var(--amb)";
            return`<tr>
              <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${clr};margin-right:6px"></span>${e}</td>
              <td class="val" style="text-align:right;color:${clr}">${c}</td>
              <td class="val" style="text-align:right;color:var(--ts)">${A.total?Math.round(c/A.total*100):0}%</td>
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`:""}

    <!-- PLAN EXECUTION -->
    ${Object.keys(A.outcomes).length?`<div class="card">
      <div class="section-h">🎯 Plan Execution</div>
      <table class="tbl">
        <thead><tr><th style="text-align:left">Outcome</th><th style="text-align:right;color:var(--purL)">Count</th><th style="text-align:right">%</th></tr></thead>
        <tbody>
          ${Object.entries(A.outcomes).sort((a,b)=>b[1]-a[1]).map(([o,c])=>{
            const clr=o==="Full Success"?"var(--grn)":o==="Mistake"?"var(--red)":"var(--amb)";
            return`<tr><td style="color:${clr}">${o}</td><td class="val" style="text-align:right;color:${clr}">${c}</td><td class="val" style="text-align:right;color:var(--ts)">${A.total?Math.round(c/A.total*100):0}%</td></tr>`;}).join('')}
        </tbody>
      </table>
    </div>`:""}

    <!-- DAY-WISE WIN RATIO -->
    ${Object.keys(A.dw).length?`<div class="card">
      <div class="section-h">📅 Day-wise Performance</div>
      <table class="tbl">
        <thead><tr><th style="text-align:left">Day</th><th style="text-align:right">Trades</th><th style="text-align:right;color:var(--purL)">Win%</th><th style="text-align:right">P&L</th></tr></thead>
        <tbody>
          ${["Mon","Tue","Wed","Thu","Fri"].filter(d=>A.dw[d]).map(d=>{
            const x=A.dw[d];const wr=Math.round((x.w/x.n)*100);
            return`<tr>
              <td style="font-weight:600">${d}</td>
              <td class="val" style="text-align:right">${x.n}</td>
              <td class="val" style="text-align:right;color:${wr>=60?"var(--grn)":"var(--amb)"}">${wr}%</td>
              <td class="val" style="text-align:right;color:${pHex(x.pnl)}">${fmt.pnl(x.pnl)}</td>
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`:""}

    <!-- TRADE TIMING -->
    <div class="card">
      <div class="section-h">⏱ Trade Timing</div>
      <table class="tbl">
        <thead><tr><th style="text-align:left">Metric</th><th style="text-align:right;color:var(--purL)">Value</th></tr></thead>
        <tbody>
          <tr><td style="color:var(--ts)">Avg Hold Time</td><td class="val" style="text-align:right">${A.avgHold>0?A.avgHold+" min":"—"}</td></tr>
          <tr><td style="color:var(--ts)">Longest Trade</td><td class="val" style="text-align:right">${A.maxHold>0?A.maxHold+" min":"—"}</td></tr>
          ${A.exits.length?Object.entries(A.exits).map(([e,c])=>`<tr><td style="color:var(--ts)">${e}</td><td class="val" style="text-align:right">${c} trades</td></tr>`).join(''):""}
        </tbody>
      </table>
    </div>

  </div>`;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function rSet(){
  const ts=S.testStatus;const c=S.cfg;
  return`<div class="screen">
    <div style="font-size:24px;font-weight:800;margin-bottom:6px">Settings</div>
    <div style="font-size:12px;color:var(--ts);margin-bottom:20px">Configure your trading parameters</div>

    <!-- TRADING CONFIG -->
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px">🎯 Trading Parameters</div>
      ${[
        {label:"Capital (₹)",key:"capital",min:10000,max:500000,step:5000},
        {label:"Daily Loss Limit (₹)",key:"dailyLoss",min:500,max:10000,step:100},
        {label:"Daily Target (₹)",key:"dailyTarget",min:500,max:50000,step:500},
        {label:"Max Trades/Day",key:"maxTrades",min:1,max:10,step:1},
      ].map(p=>`<div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:13px">${p.label}</span>
          <span class="mono" id="cv_${p.key}" style="font-size:14px;font-weight:700;color:var(--purL)">${p.key==="capital"?"₹"+c[p.key].toLocaleString("en-IN"):p.key==="maxTrades"?c[p.key]:"₹"+c[p.key].toLocaleString("en-IN")}</span>
        </div>
        <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${c[p.key]}"
          oninput="cfgSlide('${p.key}',this.value,${JSON.stringify(p)})"/>
      </div>`).join('')}
      <button onclick="saveCfg()" style="width:100%;padding:12px;background:linear-gradient(135deg,var(--pur),var(--purD));border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">Save Configuration</button>
    </div>

    <!-- CONNECTION -->
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px">🔐 Dhan API Connection</div>
      <div style="font-size:12px;color:var(--ts);line-height:1.9;background:var(--s2);border-radius:10px;padding:12px;margin-bottom:14px">
        Token stored securely in Netlify env vars<br/>
        Update: <strong style="color:var(--tp)">netlify.com → Site config → Environment variables</strong><br/>
        Keys: <code style="color:var(--purL);background:var(--s3);padding:1px 5px;border-radius:4px">DHAN_TOKEN</code> + <code style="color:var(--purL);background:var(--s3);padding:1px 5px;border-radius:4px">DHAN_CLIENT_ID</code>
      </div>
      <button onclick="testAPI()" style="width:100%;padding:13px;background:${ts==="ok"?"rgba(16,185,129,0.15)":ts==="error"?"rgba(239,68,68,0.12)":"var(--s2)"};border:1px solid ${ts==="ok"?"var(--grn)":ts==="error"?"var(--red)":"var(--brd2)"};border-radius:12px;color:${ts==="ok"?"var(--grnL)":ts==="error"?"var(--redL)":"var(--tp)"};font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">
        ${ts==="testing"?`<span class="spin">↻</span> Testing…`:ts==="ok"?"✓ Connected to Dhan API":ts==="error"?"✗ Not Connected":"Test Dhan Connection"}
      </button>
    </div>

    <button onclick="clearData()" style="width:100%;padding:12px;background:transparent;border:1px solid rgba(239,68,68,0.3);border-radius:12px;color:var(--redL);font-size:13px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;margin-bottom:14px">🗑 Clear All Saved Data</button>

    <div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:6px">Niyam TradeOS v2.1</div>
    <div style="font-size:12px;color:var(--ts);line-height:1.7"><em style="color:var(--purL)">"Trade with discipline, not emotion."</em><br/>Powered by Dhan API v2</div></div>
  </div>`;
}

// ── EVENT HANDLERS ────────────────────────────────────────────────────────────
function bind(){}

window.go=(s)=>set({screen:s,testStatus:null,syncMsg:"",openJournal:null});
window.setF=(f)=>set({filter:f,openJournal:null});
window.toggleJ=(id)=>set({openJournal:S.openJournal===id?null:id});

window.prevMonth=(months)=>{
  const idx=months.indexOf(S.selMonth);
  if(idx<months.length-1)set({selMonth:months[idx+1]});
};
window.nextMonth=(months)=>{
  const idx=months.indexOf(S.selMonth);
  if(idx>0)set({selMonth:months[idx-1]});
};

window.syncDhan=async()=>{
  set({syncing:true,syncMsg:""});
  try{
    const[fund,trades]=await Promise.all([dhanCall("/fundlimit"),dhanCall("/allpositions")]);
    sv('nf',fund);
    if(Array.isArray(trades)){
      const prev=S.trades.filter(t=>t.lesson||t.emotion||t.setup||t.grade||t.exitType||t.holdTime);
      const merged=trades.map(t=>{
        const p=prev.find(e=>e.symbol===t.symbol&&e.date===t.date);
        return p?{...t,setup:p.setup,emotion:p.emotion,lesson:p.lesson,confidence:p.confidence,
          grade:p.grade,outcome:p.outcome,exitType:p.exitType,holdTime:p.holdTime,
          mistakes:p.mistakes,sl:p.sl}:t;
      });
      sv('nt',merged);
      set({syncing:false,fund,trades:merged,syncMsg:`✓ Synced · ${merged.length} positions · Funds updated`});
    }else{
      set({syncing:false,fund,syncMsg:"✓ Funds synced"});
    }
    setTimeout(()=>set({syncMsg:""}),5000);
  }catch(e){set({syncing:false,syncMsg:`✗ ${e.message}`});}
};

window.tjSet=(tid,key,val)=>{
  const trades=S.trades.map(t=>t.id==tid?{...t,[key]:t[key]===val&&key!=="confidence"?"":val}:t);
  sv('nt',trades);set({trades});
};

window.tjMistake=(tid,m)=>{
  const trades=S.trades.map(t=>{
    if(t.id!=tid)return t;
    let ms=t.mistakes||[];
    if(m==="No Mistake"){ms=["No Mistake"];}
    else{ms=ms.includes(m)?ms.filter(x=>x!==m):[...ms.filter(x=>x!=="No Mistake"),m];}
    return{...t,mistakes:ms};
  });
  sv('nt',trades);set({trades});
};

window.saveJ=(tid)=>{
  const lesson=document.getElementById(`ls_${tid}`)?.value||"";
  const holdTime=parseInt(document.getElementById(`ht_${tid}`)?.value||0)||0;
  const trades=S.trades.map(t=>{
    if(t.id!=tid)return t;
    const grade=t.grade||(t.outcome==="Full Success"?"A":t.outcome==="Mistake"?"D":"B");
    return{...t,lesson,holdTime,grade};
  });
  sv('nt',trades);
  set({trades,openJournal:null});
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;top:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;padding:12px 24px;border-radius:12px;font-weight:700;z-index:9999;font-family:'Syne',sans-serif;font-size:14px;box-shadow:0 8px 32px rgba(99,102,241,0.4)`;
  toast.textContent="✓ Journal saved!";document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),2500);
};

window.cfgSlide=(key,val,p)=>{
  const v=parseInt(val);
  const el=document.getElementById(`cv_${key}`);
  if(el)el.textContent=key==="maxTrades"?v:"₹"+v.toLocaleString("en-IN");
  S.cfg={...S.cfg,[key]:v};
};

window.saveCfg=()=>{
  sv('cfg',S.cfg);
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--grn);color:#000;padding:12px 24px;border-radius:12px;font-weight:700;z-index:9999;font-family:'Syne',sans-serif;font-size:14px`;
  toast.textContent="✓ Configuration saved!";document.body.appendChild(toast);
  setTimeout(()=>{toast.remove();set({});},2000);
};

window.testAPI=async()=>{
  set({testStatus:"testing"});
  try{await dhanCall("/fundlimit");set({testStatus:"ok"});}
  catch(e){console.error(e);set({testStatus:"error"});}
};
window.clearData=()=>{if(!confirm("Clear all saved data?"))return;localStorage.clear();set({trades:[],fund:null,syncMsg:""});};

render();
</script>
</body>
