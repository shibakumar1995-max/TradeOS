<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Niyam TradeOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06080F;--s1:#0B0E1A;--s2:#0F1220;--s3:#141828;--s4:#1A1F30;
  --brd:rgba(99,102,241,0.12);--brd2:rgba(99,102,241,0.22);
  --pur:#6366F1;--purL:#818CF8;--purD:#4338CA;
  --grn:#10B981;--grnL:#34D399;--grnD:#059669;
  --red:#EF4444;--redL:#F87171;
  --amb:#F59E0B;--ambL:#FCD34D;
  --tp:#F1F5F9;--ts:#64748B;--tm:#1E293B;--td:#334155;
  --gold:#F59E0B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:'Syne',sans-serif;color:var(--tp);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}

/* Typography */
.mono{font-family:'DM Mono',monospace;}
.label{font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:0.1em;font-weight:500;}

/* Animations */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(99,102,241,0.3);}50%{box-shadow:0 0 25px rgba(99,102,241,0.6);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.spin{animation:spin 1s linear infinite;display:inline-block;}
.pulse{animation:pulse 2s ease-in-out infinite;}
.slide-up{animation:slideUp 0.3s ease;}

/* Cards */
.card{background:var(--s1);border:1px solid var(--brd);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(129,140,248,0.4),transparent);}
.card-sm{background:var(--s2);border-radius:14px;padding:14px 16px;border:1px solid var(--brd);}

/* Glassmorphism hero card */
.hero-card{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(16,185,129,0.06));border:1px solid rgba(99,102,241,0.25);border-radius:24px;padding:22px;margin-bottom:12px;position:relative;overflow:hidden;}
.hero-card::after{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,0.08),transparent 70%);border-radius:50%;pointer-events:none;}

/* Metric grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* Stat box */
.stat{background:var(--s2);border-radius:14px;padding:14px 15px;border:1px solid var(--brd);}
.stat .lbl{font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.stat .val{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.stat .sub{font-size:10px;color:var(--ts);margin-top:4px;}

/* P&L display */
.pnl-pos{color:var(--grn);}
.pnl-neg{color:var(--red);}
.pnl-zero{color:var(--ts);}

/* Chips */
.chip{padding:6px 13px;border-radius:20px;border:1px solid var(--brd2);background:transparent;color:var(--ts);font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;margin:3px;transition:all 0.2s;font-weight:500;}
.chip:hover{border-color:var(--pur);color:var(--purL);}
.chip.on{border-color:var(--pur);background:rgba(99,102,241,0.15);color:var(--purL);}
.chip.on-g{border-color:var(--grn);background:rgba(16,185,129,0.12);color:var(--grnL);}
.chip.on-r{border-color:var(--red);background:rgba(239,68,68,0.12);color:var(--redL);}
.chip.on-a{border-color:var(--amb);background:rgba(245,158,11,0.12);color:var(--ambL);}

/* Badge */
.bdg{border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;display:inline-block;margin:2px;}

/* Scale buttons */
.sbtn{width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--brd);color:var(--ts);cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;margin:2px;transition:all 0.15s;}
.sbtn.on{background:var(--pur);border-color:var(--pur);color:#fff;}

/* Progress bar */
.bar-wrap{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 1s ease;}

/* Toggle */
.tgl{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.tgl-thumb{width:18px;height:18px;border-radius:9px;background:#fff;position:absolute;top:3px;transition:left 0.2s;}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(11,14,26,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--brd2);display:flex;z-index:100;padding:10px 0 16px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--ts);padding:4px 2px;font-size:9px;font-family:'Syne',sans-serif;font-weight:500;transition:color 0.2s;}
.nav-btn.on{color:var(--purL);}
.nav-dot{width:4px;height:4px;border-radius:2px;background:var(--pur);}
.nav-icon{font-size:20px;line-height:1;}

/* Screen */
.screen{padding:20px 16px 90px;min-height:100vh;animation:slideUp 0.25s ease;}

/* Btn */
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.2s;}
.btn-pur{background:linear-gradient(135deg,var(--pur),var(--purD));color:#fff;}
.btn-pur:hover{filter:brightness(1.1);}
.btn-pur:disabled{background:var(--s3);color:var(--ts);cursor:not-allowed;filter:none;}
.btn-grn{background:linear-gradient(135deg,var(--grn),var(--grnD));color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--brd2);color:var(--ts);}

/* Section label */
.slbl{font-size:13px;font-weight:600;color:var(--tp);margin-bottom:8px;}
.slbl .n{color:var(--purL);}

/* Journal panel */
.j-panel{background:var(--s2);border-radius:14px;padding:14px;margin-top:10px;border:1px solid var(--brd2);}
.j-panel .chip{font-size:11px;padding:4px 10px;}

/* Range input */
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:var(--s3);outline:none;width:100%;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:8px;background:var(--pur);cursor:pointer;}
input,textarea{font-family:'Syne',sans-serif;}

/* Divider */
.div{height:1px;background:var(--brd);margin:14px 0;}

/* Live dot */
.live{display:inline-flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;border-radius:3px;background:var(--grn);animation:pulse 2s ease-in-out infinite;}

/* Score ring container */
.ring-wrap{position:relative;width:110px;height:110px;flex-shrink:0;}

/* Trade card */
.trade-card{background:var(--s1);border:1px solid var(--brd);border-radius:18px;padding:16px;margin-bottom:10px;transition:border-color 0.2s;}
.trade-card:hover{border-color:var(--brd2);}

/* Alert banner */
.alert{border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── API ───────────────────────────────────────────────────────────────────────
async function dhanCall(endpoint,body){
  const url=`/.netlify/functions/dhan?endpoint=${encodeURIComponent(endpoint)}`;
  const opts=body?{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}:{method:"GET"};
  const res=await fetch(url,opts);
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  if(data.errorCode) throw new Error(`${data.errorCode}: ${data.errorMessage}`);
  return data;
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function calcBehavior(trades){
  if(!trades.length) return{total:0,rc:0,disc:0,cons:0,eq:0,wr:0};
  const rc  = Math.round((trades.filter(t=>t.sl>0).length/trades.length)*100);
  const disc= Math.round((trades.filter(t=>["A","B","B+"].includes(t.grade)).length/trades.length)*100);
  const cons= Math.min(100,Math.round((trades.filter(t=>t.lesson||t.emotion).length/trades.length)*100));
  const eq  = Math.round((trades.reduce((a,t)=>a+(t.confidence||5),0)/trades.length)*10);
  const wins= trades.filter(t=>t.pnl>0).length;
  const wr  = Math.round((wins/trades.length)*100);
  const total=Math.round(rc*0.30+disc*0.25+cons*0.20+eq*0.15+wr*0.10);
  return{total,rc,disc,cons,eq,wr};
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt={
  pnl:(v,abs)=>{const n=abs?Math.abs(v):v;return`${n>=0?"+":""}₹${Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2})}`;},
  inr:(v)=>`₹${Number(v).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2})}`,
  num:(v)=>Number(v).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}),
};
const pnlC=(v)=>v>0?"pnl-pos":v<0?"pnl-neg":"pnl-zero";
const pnlHex=(v)=>v>0?"#10B981":v<0?"#EF4444":"#64748B";
const scoreHex=(s)=>s>=70?"#10B981":s>=45?"#F59E0B":"#EF4444";
const gradeHex=(g)=>["A","A+"].includes(g)?"#10B981":["B","B+"].includes(g)?"#F59E0B":"#EF4444";
function nowStr(){const d=new Date();return d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})+" · "+d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"});}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const load=(k,fb)=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):fb;}catch{return fb;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={
  screen:"dashboard",
  trades:load('nt',[]),
  fund:load('nf',null),
  syncing:false,syncMsg:"",testStatus:null,
  filter:"All",openJournal:null,
  j:{exitType:"",setup:"",outcome:"",confidence:5,satisfaction:5,emotion:"",mistakes:[],lesson:""},
  jSaved:false,
  time:nowStr(),
};
setInterval(()=>{S.time=nowStr();if(S.screen==="dashboard")render();},30000);

const set=(p)=>{Object.assign(S,p);render();};

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=
    `<div style="background:var(--bg);min-height:100vh;max-width:480px;margin:0 auto;">
      ${({dashboard:rDash,analytics:rAnal,trades:rTrades,settings:rSettings}[S.screen]||rDash)()}
      ${rNav()}
    </div>`;
  bind();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function rNav(){
  const tabs=[["dashboard","⬡","Home"],["analytics","◈","Analytics"],["trades","≡","Trades"],["settings","⚙","Settings"]];
  return`<div class="nav">${tabs.map(([id,ic,lb])=>`
    <button class="nav-btn ${S.screen===id?'on':''}" onclick="go('${id}')">
      <span class="nav-icon">${ic}</span>${lb}
      ${S.screen===id?'<div class="nav-dot"></div>':''}
    </button>`).join('')}</div>`;
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function Ring(score,size=110){
  const r=42,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const dash=(score/100)*circ;
  const c=scoreHex(score);
  const label=score>=70?"DISCIPLINED":score>=45?"CAUTION":"HIGH RISK";
  return`<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1A1F30" stroke-width="8"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="8"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray 1s ease;filter:drop-shadow(0 0 6px ${c}88)"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
      <span class="mono" style="font-size:22px;font-weight:700;color:${c};line-height:1">${score}</span>
      <span style="font-size:7px;color:${c};letter-spacing:0.08em;font-weight:700">${label}</span>
    </div>
  </div>`;
}

function MBar(label,weight,val){
  const c=scoreHex(val);
  return`<div style="margin-bottom:9px">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span style="font-size:11px;color:var(--ts)">${label}<span style="color:var(--tm);margin-left:4px">${weight}%</span></span>
      <span class="mono" style="font-size:11px;color:${c};font-weight:600">${val}%</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${val}%;background:linear-gradient(90deg,${c}88,${c})"></div></div>
  </div>`;
}

function Bdg(t,c){return`<span class="bdg" style="background:${c}18;color:${c};border:1px solid ${c}33">${t}</span>`;}

function Stat(lbl,val,color,sub){
  return`<div class="stat">
    <div class="lbl">${lbl}</div>
    <div class="val ${pnlC(typeof val==='number'?val:0)}" style="${color?`color:${color}`:''}">${typeof val==='string'?val:fmt.pnl(val)}</div>
    ${sub?`<div class="sub">${sub}</div>`:''}
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function rDash(){
  const beh=calcBehavior(S.trades);
  const closedPnL=S.trades.reduce((a,t)=>a+(t.realizedPnl||0),0);
  const openPnL=S.trades.reduce((a,t)=>a+(t.unrealizedPnl||0),0);
  const totalPnL=closedPnL+openPnL;
  const openCount=S.trades.filter(t=>t.isClosed===false).length;
  const closedCount=S.trades.filter(t=>t.isClosed!==false).length;
  const wins=S.trades.filter(t=>(t.realizedPnl||0)>0).length;
  const total=S.trades.length;
  const avail=S.fund?.availabelBalance||0;
  const margin=S.fund?.utilizedAmount||0;
  const sodLimit=S.fund?.sodLimit||0;

  const riskLevel=beh.total>=70?"LOW RISK":beh.total>=45?"MODERATE":"HIGH RISK";
  const riskColor=scoreHex(beh.total);

  // Loss warning
  const lossWarning=closedPnL<-1000;

  return`<div class="screen">
    <!-- HEADER -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <div style="font-size:10px;color:var(--ts);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:3px">NIYAM TRADEOS</div>
        <div style="font-size:24px;font-weight:800;letter-spacing:-0.5px">Dashboard</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <button onclick="syncDhan()" style="display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--pur),var(--purD));border:none;border-radius:10px;color:#fff;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;opacity:${S.syncing?0.7:1}">
          <span class="${S.syncing?'spin':''}" style="display:inline-block;font-size:14px">↻</span>${S.syncing?"SYNCING":"SYNC DHAN"}
        </button>
        <div class="live"><div class="live-dot"></div><span style="font-size:10px;color:var(--ts)">${S.time}</span></div>
      </div>
    </div>

    ${S.syncMsg?`<div class="alert" style="background:${S.syncMsg.startsWith("✓")?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)"};border:1px solid ${S.syncMsg.startsWith("✓")?"var(--grn)":"var(--red)"}33">
      <span style="font-size:18px">${S.syncMsg.startsWith("✓")?"✓":"⚠"}</span>
      <span style="font-size:12px;color:${S.syncMsg.startsWith("✓")?"var(--grnL)":"var(--redL)"}">${S.syncMsg}</span>
    </div>`:""}

    ${lossWarning?`<div class="alert" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25)">
      <span style="font-size:16px">🚨</span>
      <div><div style="font-size:12px;font-weight:700;color:var(--redL)">Loss Alert</div>
      <div style="font-size:11px;color:var(--ts)">Closed P&L exceeds -₹1,000. Review your risk.</div></div>
    </div>`:""}

    <!-- P&L HERO CARD -->
    <div class="hero-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div>
          <div class="label" style="margin-bottom:6px">TOTAL P&L TODAY</div>
          <div class="mono ${pnlC(totalPnL)}" style="font-size:32px;font-weight:700;line-height:1;filter:drop-shadow(0 0 8px ${pnlHex(totalPnL)}66)">${fmt.pnl(totalPnL)}</div>
          <div style="font-size:11px;color:var(--ts);margin-top:6px">${total} positions · ${wins} wins · ${total-wins} losses</div>
        </div>
        <div style="text-align:right">
          ${Bdg(S.fund?"LIVE":"OFFLINE",S.fund?"#10B981":"#64748B")}
          <div style="margin-top:8px">
            <div style="font-size:10px;color:var(--ts)">Risk Level</div>
            <div style="font-size:12px;font-weight:700;color:${riskColor}">${riskLevel}</div>
          </div>
        </div>
      </div>
      <!-- P&L BREAKDOWN BAR -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;border:1px solid rgba(16,185,129,0.2)">
          <div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Realized (Closed)</div>
          <div class="mono ${pnlC(closedPnL)}" style="font-size:16px;font-weight:700">${fmt.pnl(closedPnL)}</div>
          <div style="font-size:10px;color:var(--ts);margin-top:3px">${closedCount} closed</div>
        </div>
        <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;border:1px solid rgba(99,102,241,0.2)">
          <div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Unrealized (Open)</div>
          <div class="mono ${pnlC(openPnL)}" style="font-size:16px;font-weight:700">${fmt.pnl(openPnL)}</div>
          <div style="font-size:10px;color:var(--ts);margin-top:3px">${openCount} open</div>
        </div>
      </div>
    </div>

    <!-- BEHAVIOURAL SCORE -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div style="font-size:15px;font-weight:700">Behavioural Score</div>
          <div style="font-size:11px;color:var(--ts);margin-top:2px">Discipline · Risk · Consistency</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--ts);margin-bottom:4px">COMPOSITE</div>
          <div class="mono" style="font-size:28px;font-weight:800;color:${scoreHex(beh.total)};filter:drop-shadow(0 0 8px ${scoreHex(beh.total)}55)">${beh.total}%</div>
        </div>
      </div>
      <div style="display:flex;gap:14px;align-items:center">
        ${Ring(beh.total)}
        <div style="flex:1">
          ${MBar("Risk Control",30,beh.rc)}
          ${MBar("Discipline",25,beh.disc)}
          ${MBar("Consistency",20,beh.cons)}
          ${MBar("Exec Quality",15,beh.eq)}
          ${MBar("Win Ratio",10,beh.wr)}
        </div>
      </div>
    </div>

    <!-- ACCOUNT STATS -->
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px">Account Overview</div>
      <div class="grid-2" style="gap:10px;margin-bottom:10px">
        <div class="stat">
          <div class="lbl">Available Funds</div>
          <div class="val mono" style="color:var(--tp);font-size:15px">${fmt.inr(avail)}</div>
        </div>
        <div class="stat">
          <div class="lbl">Margin Used</div>
          <div class="val mono" style="color:var(--tp);font-size:15px">${fmt.inr(margin)}</div>
        </div>
      </div>
      <div class="grid-3">
        <div style="background:var(--s2);border-radius:12px;padding:12px;border:1px solid var(--brd);text-align:center">
          <div class="lbl" style="margin-bottom:5px">TRADES</div>
          <div class="mono" style="font-size:20px;font-weight:700;color:var(--purL)">${total}</div>
        </div>
        <div style="background:rgba(16,185,129,0.08);border-radius:12px;padding:12px;border:1px solid rgba(16,185,129,0.2);text-align:center">
          <div class="lbl" style="margin-bottom:5px;color:var(--grn)">WINS</div>
          <div class="mono" style="font-size:20px;font-weight:700;color:var(--grn)">${wins}</div>
        </div>

          ${unr!==0?`<div class="mono" style="font-size:11px;color:${pnlHex(unr)}">MTM ${fmt.pnl(unr)}</div>`:""}
          <div style="font-size:10px;color:var(--ts);margin-top:2px">${Bdg(t.type,t.type==="BUY"?"#10B981":"#EF4444")}</div>
        </div>
      </div>

      ${t.setup||t.emotion||t.grade?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px">
        ${t.setup?Bdg(t.setup,"#818CF8"):""}

      <button onclick="toggleJ('${t.id}')" style="width:100%;padding:8px;background:${isOpen?"rgba(99,102,241,0.2)":hasJournal?"rgba(16,185,129,0.08)":"var(--s2)"};border:1px solid ${isOpen?"var(--pur)":hasJournal?"rgba(16,185,129,0.3)":"var(--brd)"};border-radius:10px;color:${isOpen?"var(--purL)":hasJournal?"var(--grnL)":"var(--ts)"};font-size:12px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.2s">

      <div>
        <div style="font-size:24px;font-weight:800">Trades</div>
        <div style="font-size:11px;color:var(--ts);margin-top:2px">${S.trades.length} positions · <span class="mono ${pnlC(totalPnL)}">${fmt.pnl(totalPnL)}</span></div>

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function rAnal(){
  const t=S.trades;
  if(!t.length) return`<div class="screen"><div style="font-size:24px;font-weight:800;margin-bottom:24px">Analytics</div>
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">📊</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">No Data Yet</div>
      <div style="font-size:13px;color:var(--ts);margin-bottom:20px">Sync Dhan to load your trading data</div>
      <button onclick="go('dashboard')" class="btn btn-pur" style="width:auto;padding:12px 28px">Go Sync →</button>
    </div></div>`;

  const closedPnL=t.reduce((a,x)=>a+(x.realizedPnl||0),0);
  const openPnL=t.reduce((a,x)=>a+(x.unrealizedPnl||0),0);
  const totalPnL=closedPnL+openPnL;
  const closed=t.filter(x=>x.isClosed!==false);
  const wins=closed.filter(x=>(x.realizedPnl||0)>0),losses=closed.filter(x=>(x.realizedPnl||0)<0);
  const wr=closed.length?Math.round((wins.length/closed.length)*100):0;
  const avgW=wins.length?wins.reduce((a,x)=>a+(x.realizedPnl||0),0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((a,x)=>a+(x.realizedPnl||0),0)/losses.length):1;
  const rr=(avgW/avgL).toFixed(2);
  const pf=losses.length?(avgW*wins.length/(avgL*losses.length)).toFixed(2):"∞";
  const beh=calcBehavior(t);

  const syms=[...new Set(t.map(x=>x.symbol.split("-")[0].split(" ")[0]))].slice(0,6);
  const symS=syms.map(s=>{const tr=t.filter(x=>x.symbol.startsWith(s));const w=tr.filter(x=>(x.realizedPnl||0)>0).length;const spnl=tr.reduce((a,x)=>a+(x.realizedPnl||0),0);return{s:s.slice(0,10),wr:tr.length?Math.round((w/tr.length)*100):0,pnl:spnl};});
  const emoD=["Calm","Frustrated","Overconfident","Anxious","Impatient","Revenge"].map(e=>({e,c:t.filter(x=>x.emotion===e).length})).filter(x=>x.c>0);
  const maxE=Math.max(...emoD.map(x=>x.c),1);

  return`<div class="screen">
    <div style="font-size:24px;font-weight:800;margin-bottom:18px">Analytics</div>

    <!-- KPI GRID -->
    <div class="grid-2" style="margin-bottom:12px">
      <div class="card" style="padding:16px;text-align:center">
        <div class="label" style="margin-bottom:6px">Total P&L</div>
        <div class="mono ${pnlC(totalPnL)}" style="font-size:20px;font-weight:800">${fmt.pnl(totalPnL)}</div>
      </div>
      <div class="card" style="padding:16px;text-align:center">
        <div class="label" style="margin-bottom:6px">Win Rate</div>
        <div class="mono" style="font-size:20px;font-weight:800;color:${wr>=60?"var(--grn)":"var(--amb)"}">${wr}%</div>
        <div style="font-size:10px;color:var(--ts);margin-top:3px">${wins.length}W · ${losses.length}L</div>
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:12px">
      <div class="card" style="padding:16px;text-align:center">
        <div class="label" style="margin-bottom:6px">Avg R:R</div>
        <div class="mono" style="font-size:20px;font-weight:800;color:${parseFloat(rr)>=1.5?"var(--grn)":"var(--amb)"}">${rr}</div>
        <div style="font-size:10px;color:var(--ts);margin-top:3px">Avg Win ₹${fmt.num(avgW)}</div>
      </div>
      <div class="card" style="padding:16px;text-align:center">
        <div class="label" style="margin-bottom:6px">Profit Factor</div>
        <div class="mono" style="font-size:20px;font-weight:800;color:${parseFloat(pf)>=1.5?"var(--grn)":"var(--amb)"}">${pf}</div>
        <div style="font-size:10px;color:var(--ts);margin-top:3px">Avg Loss ₹${fmt.num(avgL)}</div>
      </div>
    </div>

    <!-- P&L BREAKDOWN -->
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px">P&L Breakdown</div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--brd)">
        <span style="font-size:12px;color:var(--ts)">Realized (Closed positions)</span>
        <span class="mono ${pnlC(closedPnL)}" style="font-size:14px;font-weight:700">${fmt.pnl(closedPnL)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--brd)">
        <span style="font-size:12px;color:var(--ts)">Unrealized (Open positions)</span>
        <span class="mono ${pnlC(openPnL)}" style="font-size:14px;font-weight:700">${fmt.pnl(openPnL)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0">
        <span style="font-size:13px;font-weight:700;color:var(--tp)">Net Total</span>
        <span class="mono ${pnlC(totalPnL)}" style="font-size:16px;font-weight:800">${fmt.pnl(totalPnL)}</span>
      </div>
    </div>

    <!-- SYMBOL BREAKDOWN -->
    ${symS.length?`<div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px">Symbol Performance</div>
      ${symS.map(s=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:70px;font-size:11px;color:var(--ts);font-weight:600">${s.s}</div>
        <div style="flex:1">
          <div class="bar-wrap"><div class="bar-fill" style="width:${s.wr}%;background:${s.wr>=70?"var(--grn)":s.wr>=50?"var(--amb)":"var(--red)"}"></div></div>
        </div>
        <div class="mono" style="font-size:11px;color:${s.wr>=70?"var(--grn)":s.wr>=50?"var(--amb)":"var(--red)"};width:30px;text-align:right">${s.wr}%</div>
        <div class="mono ${pnlC(s.pnl)}" style="font-size:11px;width:70px;text-align:right">${fmt.pnl(s.pnl)}</div>
      </div>`).join('')}
    </div>`:""}

    <!-- BEHAVIOUR SCORE -->
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px">Behaviour Score</div>
      ${MBar("Risk Control",30,beh.rc)}
      ${MBar("Discipline",25,beh.disc)}
      ${MBar("Consistency",20,beh.cons)}
      ${MBar("Exec Quality",15,beh.eq)}
      ${MBar("Win Ratio",10,beh.wr)}
    </div>

    <!-- EMOTION FREQUENCY -->
    ${emoD.length?`<div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px">Emotional Frequency</div>
      ${emoD.map(x=>{const c=x.e==="Calm"?"var(--grn)":["Frustrated","Overconfident","Revenge"].includes(x.e)?"var(--red)":"var(--amb)";return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
        <div style="width:80px;font-size:11px;color:var(--ts)">${x.e}</div>
        <div style="flex:1"><div class="bar-wrap"><div class="bar-fill" style="width:${(x.c/maxE)*100}%;background:${c}"></div></div></div>
        <div class="mono" style="font-size:11px;color:${c};width:20px;text-align:right">${x.c}</div>
      </div>`;}).join('')}
    </div>`:""}
  </div>`;
}

        <em style="color:var(--purL);font-size:13px">"Trade with discipline, not emotion."</em><br/>
        Niyam TradeOS v2.0 · Personal institutional-grade trading OS<br/>
        Powered by Dhan API v2
      </div>
    </div>

    <button onclick="clearData()" style="width:100%;padding:13px;background:transparent;border:1px solid rgba(239,68,68,0.3);border-radius:12px;color:var(--redL);font-size:13px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif">
      🗑 Clear All Saved Data
    </button>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function bind(){
  const ta=document.getElementById('jlesson');
  if(ta) ta.addEventListener('input',e=>S.j.lesson=e.target.value);
}

window.go=(s)=>set({screen:s,testStatus:null,syncMsg:"",openJournal:null});
window.setF=(f)=>set({filter:f,openJournal:null});
window.toggleJ=(id)=>set({openJournal:S.openJournal===id?null:id});

window.syncDhan=async()=>{
  set({syncing:true,syncMsg:""});
  try{
    const [fund,trades]=await Promise.all([dhanCall("/fundlimit"),dhanCall("/allpositions")]);
    save('nf',fund);
    if(Array.isArray(trades)){
      const prev=S.trades.filter(t=>t.lesson||t.emotion||t.setup);
      const merged=trades.map(t=>{
        const p=prev.find(e=>e.symbol===t.symbol&&e.date===t.date);
        return p?{...t,setup:p.setup,emotion:p.emotion,lesson:p.lesson,confidence:p.confidence,grade:p.grade,outcome:p.outcome}:t;
      });
      save('nt',merged);
      set({syncing:false,fund,trades:merged,syncMsg:`✓ Synced successfully · ${merged.length} positions loaded`});
    } else {
      set({syncing:false,fund,syncMsg:"✓ Funds synced (no positions found)"});
    }
    setTimeout(()=>set({syncMsg:""}),5000);
  }catch(e){set({syncing:false,syncMsg:`✗ ${e.message}`});}
};

window.tjSet=(tid,key,val)=>{
  const trades=S.trades.map(t=>t.id==tid?{...t,[key]:t[key]===val?"":val}:t);
  save('nt',trades);
  set({trades});
};

window.saveJ=(tid)=>{
  const el=document.getElementById(`ls_${tid}`);
  const lesson=el?el.value:"";
  const trades=S.trades.map(t=>{
    if(t.id==tid){
      const grade=t.outcome==="Full Success"?"A":t.outcome==="Partial"?"B+":t.outcome==="Mistake"?"D":t.grade||"B";
      return{...t,lesson,grade};
    }
    return t;
  });
  save('nt',trades);
  set({trades,openJournal:null});
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;top:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;padding:12px 24px;border-radius:12px;font-weight:700;z-index:9999;font-family:'Syne',sans-serif;font-size:14px;box-shadow:0 8px 32px rgba(99,102,241,0.4)`;
  toast.textContent="✓ Journal saved!";
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),2500);
};

window.jset=(key,val)=>{const j={...S.j};j[key]=j[key]===val?"":val;set({j});};
window.jscale=(key,val)=>{const j={...S.j};j[key]=val;set({j});};
window.jtoggle=(m)=>{const j={...S.j};if(m==="No Mistake"){j.mistakes=["No Mistake"];}else{j.mistakes=j.mistakes.includes(m)?j.mistakes.filter(x=>x!==m):[...j.mistakes.filter(x=>x!=="No Mistake"),m];}set({j});};

window.testAPI=async()=>{
  set({testStatus:"testing"});
  try{await dhanCall("/fundlimit");set({testStatus:"ok"});}
  catch(e){console.error(e);set({testStatus:"error"});}
};
window.clearData=()=>{if(!confirm("Clear all saved data?"))return;localStorage.clear();set({trades:[],fund:null});};

render();
</script>
</body>
</html>
